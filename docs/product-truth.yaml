# Prism — Product Truth Matrix
# Generated: 2026-03-16
# Purpose: Machine-readable status of every README module against actual implementation
# Update this file as tasks are completed. Never let claims outpace reality.

meta:
  last_updated: "2026-03-16"
  assessed_by: "Code audit of backend/src and frontend/src"
  notes: >
    Code exists for most modules (handlers, endpoints, UI pages), but the delivery plan's
    quality bar (runtime layer, capability probing, durable jobs, comprehensive tests,
    polished UX with all states, accessibility, Storybook, Playwright) is not yet met.
    "Code exists" != "Done". This matrix distinguishes between the two.

modules:

  - id: playground
    name: Playground
    phase: 1
    promise: "Chat with streaming, per-token heatmap, alternatives panel, entropy/perplexity/surprise, save/fork/replay/export, 2-4 pane compare mode"
    current_status: partial
    backend_status: implemented
    backend_notes: >
      SSE streaming endpoint, conversation CRUD, message persistence, logprobs forwarding.
      Missing: does not route through a shared IInferenceRuntime (ADR-013). Recording is
      via decorator, not centralized. Token analysis (entropy/perplexity/surprise) is
      computed ad hoc, not via ITokenAnalysisService.
    frontend_status: implemented
    frontend_notes: >
      Multi-panel layout, SSE streaming with token accumulation, parameter sidebar,
      logprobs visualization (TokenHeatmap, AlternativeTokensPanel, EntropyChart,
      SurpriseHighlighter, PerplexityBadge). Token inspector drawer opens on token
      click with navigation, metrics grid, alternatives with bars, context view.
      Response metrics strip (tokens, latency, TTFT, throughput, perplexity) on every
      assistant message. Compare mode supports 2-4 panes in 2x2 grid, allows same
      instance. No Storybook stories. No Playwright tests.
    provider_limitations: >
      Logprobs require provider support (vLLM full, Ollama partial, LM Studio none).
      No capability-aware UI gating yet — controls show regardless of provider support.
    tests_present: false
    release_blockers:
      - Inference calls must route through IInferenceRuntime (P1-01)
      - Token analysis must use shared ITokenAnalysisService (P1-01)
      - Capability-aware UI gating needed (P1-02)
      - Compare mode needs polish (P1-04)
      - Tests needed (P1-09)

  - id: token-explorer
    name: Token Explorer
    phase: 1
    promise: "Step one token at a time, force from top-K, branch from any step, inspect distributions, view generation tree, diff branches"
    current_status: partial
    backend_status: implemented
    backend_notes: >
      Tokenize, detokenize, next-token prediction, branch exploration endpoints exist.
      No persisted entities (stateless). Missing: does not use shared runtime or trace
      schemas. Branch tree is computed client-side.
    frontend_status: implemented
    frontend_notes: >
      5-tab layout (predictions, step-through, branches, tokenizer, compare).
      Probability distribution display, sampling visualization, branch tree view.
      Branch diff view added — side-by-side token comparison with divergence detection,
      position-indexed rows, probability display, forced token markers. Three view
      modes: tree, list, diff. No Storybook or Playwright coverage.
    provider_limitations: >
      Requires logprobs and tokenize support. Only vLLM provides full experience.
      Ollama supports logprobs but not tokenize. No capability gating in UI.
    tests_present: false
    release_blockers:
      - Capability gating needed (P1-02)
      - Tests needed (P1-09)

  - id: tokenizer-explorer
    name: Tokenizer Explorer
    phase: 1
    promise: "Paste text, inspect tokens/spans/IDs/bytes, compare across models, see token counts and cost estimate"
    current_status: partial
    backend_status: implemented
    backend_notes: >
      Tokenize endpoint exists via Token Explorer backend. No separate feature slice
