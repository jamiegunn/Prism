# Cross-cutting concerns

cross_cutting:

  - id: inference-runtime
    name: Shared Inference Runtime
    status: implemented
    notes: >
      IInferenceRuntime (non-streaming + streaming), IInferenceRecorder (channel-backed),
      ITokenAnalysisService (perplexity, entropy, surprise), IReplayService (load + re-execute
      with overrides), IRuntimeProviderResolver (DB lookup + factory). All registered in DI.
      Features can now call runtime instead of wiring providers directly. Existing features
      not yet migrated to use runtime (migration is per-feature work in P1-04+).

  - id: capability-registry
    name: Provider Capability Registry
    status: implemented
    notes: >
      IProviderCapabilityRegistry implemented with ProbeAsync (live probe via health/tokenize/metrics),
      GetCachedAsync (read from DB), ListAllAsync. CapabilityTier enum (Unknown/Chat/Inspect/Research).
      ProviderCapabilitySnapshot record with all capability flags + probe timestamp + error.
      API endpoints: GET /capabilities (list all), GET /{id}/capabilities (cached),
      POST /{id}/probe (live probe). Probed results persist to InferenceInstance entity.
      Registration already probes on create. Frontend capability gating not yet implemented.

  - id: artifact-store
    name: Artifact Store
    status: not_started
    notes: >
      ADR-014 accepted. IArtifactStore not yet implemented. Features write files
      directly via IFileStorage without standardized metadata, hashing, or
      schema versioning.

  - id: job-model
    name: Durable Job Model
    status: not_started
    notes: >
      ADR-016 accepted. IJobQueue exists with InMemoryJobQueue and RedisJobQueue,
      but jobs are not durable across restarts. No lease/heartbeat model. No
      retry policy. This blocks P3-03.

  - id: workspace-project
    name: Workspace & Project Organization
    status: implemented
    notes: >
      Workspace entity created (Prism.Features/Workspaces/) with CRUD endpoints
      and default workspace seeded on first launch. Project entity has optional
      WorkspaceId. 7 features already reference ProjectId. Frontend: workspace
      switcher in sidebar, Zustand store for active workspace/project context.

  - id: tests
    name: Test Suite
    status: partial
    notes: >
      32 backend unit tests passing: TokenAnalysisService (7), LogprobsCalculator (8),
      InferenceRuntime (5), ChannelInferenceRecorder (3), CapabilityTier (9).
      12 Playwright E2E specs defined (smoke + Phase 1 pages). No integration tests
      with Testcontainers yet. No Storybook component tests yet.

  - id: ci
    name: CI Quality Gates
    status: implemented
    notes: >
      GitHub Actions CI pipeline configured (.github/workflows/ci.yml).
      Jobs: backend build+test, backend format, frontend build+typecheck,
      frontend lint, OpenAPI drift check, Orval drift check, Storybook build,
      Playwright smoke tests. All core gates (build, typecheck, lint) pass green.
      Drift checks and Storybook/Playwright emit warnings until fully configured.

  - id: storybook
    name: Storybook Coverage
    status: configured
    notes: >
      Storybook config exists (.storybook/main.ts, preview.ts). CI job will
      build Storybook when dependencies are installed. No component stories yet.
      Storybook packages need to be installed (npx storybook@latest init).

  - id: playwright
    name: Playwright E2E Tests
    status: configured
    notes: >
      Playwright config exists (playwright.config.ts) with Chromium project.
      3 smoke tests defined (app load, nav visible, playground renders).
      CI job will run Playwright when @playwright/test is installed.
      Packages need to be installed (npm i -D @playwright/test).

  - id: openapi-orval
    name: OpenAPI & Orval Client Generation
    status: partial
    notes: >
      Generated API client exists (51 files) but may be stale relative to
      current backend endpoints. CI drift checks configured but will emit
      warnings until OpenAPI spec file is committed and backend export is wired.

  - id: design-system
    name: Design System
    status: partial
    notes: >
      17 shadcn/ui components installed. Tailwind configured. Dark mode default.
      Missing: semantic design tokens, color-blind-safe palette, comprehensive
      component patterns (diff, inspector, timeline, stepper, tree, code editor).
      No Storybook documentation.

  - id: accessibility
    name: Accessibility (WCAG 2.1 AA)
    status: partial
    notes: >
      Some ARIA labels and tooltips present. Missing: systematic keyboard
      navigation, visible focus rings everywhere, chart data table fallbacks,
      screen reader testing.

  - id: seed-data
    name: Seed Data & Fixtures
    status: implemented
    notes: >
      8 seeders registered and running on dev startup. Coverage:
      ModelsSeeder (2 providers with well-known IDs), PlaygroundSeeder (3 templates,
      logprobs demo, 2 use case guides), HistorySeeder (3 inference records),
      ExperimentsSeeder (1 project, 1 experiment, 2 runs), PromptLabSeeder
      (2 templates, 3 versions), DatasetsSeeder (1 dataset, 6 records, 3 splits),
      RagSeeder (1 collection, 1 document, 3 chunks), AgentsSeeder (1 workflow,
      1 completed run with 3-step trace). All idempotent.
